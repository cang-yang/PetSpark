name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0.40
        env:
          MYSQL_DATABASE: petspark
          MYSQL_USER: petspark
          MYSQL_PASSWORD: petspark_local
          MYSQL_ROOT_PASSWORD: root_local_only
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot_local_only --silent"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Verify backend
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/petspark?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
          DB_USERNAME: petspark
          DB_PASSWORD: petspark_local
        run: ./mvnw --batch-mode --no-transfer-progress verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: petspark-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: npm
          cache-dependency-path: petspark-web/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit -- --runInBand
      - name: Build production bundle
        run: npm run build
