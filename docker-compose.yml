name: petspark

services:
  mysql:
    image: mysql:8.0.40
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-petspark}
      MYSQL_USER: ${MYSQL_USER:-petspark}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-petspark_local}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_local_only}
      TZ: UTC
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - petspark-mysql-data:/var/lib/mysql

volumes:
  petspark-mysql-data:
