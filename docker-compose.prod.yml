name: petspark

services:
  mysql:
    image: mysql:8.0.40
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-petspark}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+00:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - petspark-internal

  petspark-server:
    image: ghcr.io/cang-yang/petspark-server:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-petspark}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AI_MESSAGE_SECRET: ${AI_MESSAGE_SECRET:?AI_MESSAGE_SECRET is required}
      PETSPARK_HEALTH_DETAIL_SECRET: ${PETSPARK_HEALTH_DETAIL_SECRET:?PETSPARK_HEALTH_DETAIL_SECRET is required}
      PETSPARK_USER_PHONE_SECRET: ${PETSPARK_USER_PHONE_SECRET:?PETSPARK_USER_PHONE_SECRET is required}
      FILE_STORAGE_ROOT: /app/data/files
      PETSPARK_CORS_ALLOWED_ORIGINS: https://petspark.canggo.com
      PETSPARK_DEMO_USERS_ENABLED: ${PETSPARK_DEMO_USERS_ENABLED:-true}
      PETSPARK_DEMO_ADMIN_USERNAME: ${PETSPARK_DEMO_ADMIN_USERNAME:-admin}
      PETSPARK_DEMO_ADMIN_EMAIL: ${PETSPARK_DEMO_ADMIN_EMAIL:-admin@petspark.local}
      PETSPARK_DEMO_ADMIN_NICKNAME: ${PETSPARK_DEMO_ADMIN_NICKNAME:-平台管理员}
      PETSPARK_DEMO_ADMIN_PASSWORD: ${PETSPARK_DEMO_ADMIN_PASSWORD:?PETSPARK_DEMO_ADMIN_PASSWORD is required}
      PETSPARK_DEMO_MEMBER_USERNAME: ${PETSPARK_DEMO_MEMBER_USERNAME:-demo}
      PETSPARK_DEMO_MEMBER_EMAIL: ${PETSPARK_DEMO_MEMBER_EMAIL:-demo@petspark.local}
      PETSPARK_DEMO_MEMBER_NICKNAME: ${PETSPARK_DEMO_MEMBER_NICKNAME:-演示用户}
      PETSPARK_DEMO_MEMBER_PASSWORD: ${PETSPARK_DEMO_MEMBER_PASSWORD:?PETSPARK_DEMO_MEMBER_PASSWORD is required}
      PETSPARK_DEMO_DATA_ENABLED: ${PETSPARK_DEMO_DATA_ENABLED:-true}
      PETSPARK_DEMO_DATA_FUTURE_DAYS: ${PETSPARK_DEMO_DATA_FUTURE_DAYS:-7}
      MAIL_HOST: ${MAIL_HOST:-smtp.163.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SSL_ENABLED: ${MAIL_SSL_ENABLED:-true}
      MAIL_STARTTLS_ENABLED: ${MAIL_STARTTLS_ENABLED:-false}
      MAIL_CONNECTION_TIMEOUT_MS: ${MAIL_CONNECTION_TIMEOUT_MS:-5000}
      MAIL_READ_TIMEOUT_MS: ${MAIL_READ_TIMEOUT_MS:-5000}
      MAIL_WRITE_TIMEOUT_MS: ${MAIL_WRITE_TIMEOUT_MS:-5000}
      REGISTRATION_MAIL_ENABLED: ${REGISTRATION_MAIL_ENABLED:-false}
      REGISTRATION_MAIL_FROM: ${REGISTRATION_MAIL_FROM:-}
      PASSWORD_RESET_MAIL_ENABLED: ${PASSWORD_RESET_MAIL_ENABLED:-false}
      PASSWORD_RESET_MAIL_FROM: ${PASSWORD_RESET_MAIL_FROM:-}
      SPARK_ENABLED: ${SPARK_ENABLED:-false}
      SPARK_BASE_URL: ${SPARK_BASE_URL:-https://spark-api-open.xf-yun.com/v2}
      SPARK_MODEL: ${SPARK_MODEL:-spark-x}
      SPARK_API_PASSWORD: ${SPARK_API_PASSWORD:-}
      AI_CARE_QA_ENABLED: ${AI_CARE_QA_ENABLED:-false}
    volumes:
      - file-data:/app/data/files
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - petspark-internal

  petspark-web:
    image: ghcr.io/cang-yang/petspark-web:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    depends_on:
      petspark-server:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_BIND_PORT:-18081}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - petspark-internal

networks:
  petspark-internal:
    driver: bridge

volumes:
  mysql-data:
  file-data:
