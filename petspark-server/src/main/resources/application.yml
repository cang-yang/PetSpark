spring:
  application:
    name: petspark-server
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/petspark?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 7MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
    map-underscore-to-camel-case: true

server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

petspark:
  file:
    storage-root: ${FILE_STORAGE_ROOT:./data/files}
  auth:
    captcha:
      ttl-seconds: ${AUTH_CAPTCHA_TTL_SECONDS:300}
    jwt:
      secret: ${JWT_SECRET:dev-only-change-me-petspark-auth-secret-32bytes}
      expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:1800}
    refresh:
      expires-in-seconds: ${REFRESH_TOKEN_EXPIRES_IN_SECONDS:604800}
    password-reset:
      ttl-seconds: ${PASSWORD_RESET_TTL_SECONDS:600}
      mail:
        enabled: ${PASSWORD_RESET_MAIL_ENABLED:false}
        from: ${PASSWORD_RESET_MAIL_FROM:}
  ai:
    enabled: ${SPARK_ENABLED:false}
    base-url: ${SPARK_BASE_URL:https://spark-api-open.xf-yun.com/v2}
    model: ${SPARK_MODEL:spark-x}
