spring:
  application:
    name: petspark-server
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/petspark?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 7MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
    map-underscore-to-camel-case: true

server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

petspark:
  web:
    cors:
      # 本地默认使用 Vue devServer 同源代理。仅在确需浏览器直连后端时设置精确源列表，逗号分隔。
      allowed-origins: ${PETSPARK_CORS_ALLOWED_ORIGINS:}
  demo-users:
    # 默认不创建已知账号；显式开启时必须通过环境变量提供两组强密码。
    enabled: ${PETSPARK_DEMO_USERS_ENABLED:false}
    admin-username: ${PETSPARK_DEMO_ADMIN_USERNAME:admin}
    admin-email: ${PETSPARK_DEMO_ADMIN_EMAIL:admin@petspark.local}
    admin-nickname: ${PETSPARK_DEMO_ADMIN_NICKNAME:平台管理员}
    admin-password: ${PETSPARK_DEMO_ADMIN_PASSWORD:}
    member-username: ${PETSPARK_DEMO_MEMBER_USERNAME:demo}
    member-email: ${PETSPARK_DEMO_MEMBER_EMAIL:demo@petspark.local}
    member-nickname: ${PETSPARK_DEMO_MEMBER_NICKNAME:演示用户}
    member-password: ${PETSPARK_DEMO_MEMBER_PASSWORD:}
  file:
    storage-root: ${FILE_STORAGE_ROOT:./data/files}
  auth:
    captcha:
      ttl-seconds: ${AUTH_CAPTCHA_TTL_SECONDS:300}
    jwt:
      secret: ${JWT_SECRET:dev-only-change-me-petspark-auth-secret-32bytes}
      expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:1800}
    refresh:
      expires-in-seconds: ${REFRESH_TOKEN_EXPIRES_IN_SECONDS:604800}
    password-reset:
      ttl-seconds: ${PASSWORD_RESET_TTL_SECONDS:600}
      mail:
        enabled: ${PASSWORD_RESET_MAIL_ENABLED:false}
        from: ${PASSWORD_RESET_MAIL_FROM:}
  notification:
    dispatcher:
      batch-size: ${NOTIFY_DISPATCHER_BATCH_SIZE:20}
      poll-interval-seconds: ${NOTIFY_DISPATCHER_POLL_SECONDS:5}
      max-attempts: ${NOTIFY_DISPATCHER_MAX_ATTEMPTS:5}
      backoff-seconds: ${NOTIFY_DISPATCHER_BACKOFF_SECONDS:30}
      # 认领后超过该时长仍卡在 PROCESSING 的事件视为僵死，下一轮回收回 PENDING 重投。
      stuck-processing-seconds: ${NOTIFY_DISPATCHER_STUCK_SECONDS:120}
  ai:
    enabled: ${SPARK_ENABLED:false}
    base-url: ${SPARK_BASE_URL:https://spark-api-open.xf-yun.com/v2}
    model: ${SPARK_MODEL:spark-x}
    api-password: ${SPARK_API_PASSWORD:}
    connect-timeout: ${SPARK_CONNECT_TIMEOUT:5s}
    read-timeout: ${SPARK_READ_TIMEOUT:30s}
    # AI 对话消息正文 AES-GCM 加密密钥；生产通过 AI_MESSAGE_SECRET 注入，禁止复用 dev 默认值。
    message-secret: ${AI_MESSAGE_SECRET:dev-only-change-me-petspark-ai-message-secret}
    # 单用户每分钟调用次数上限（内存滑动窗口）；0/负数回退为 10。
    rate-limit-per-minute: ${AI_RATE_LIMIT_PER_MINUTE:10}
    # 护理问答场景独立开关（PR-AI-04 / REQ-AI-004）。默认关闭，上线门禁通过前保持 false。
    # 全局 AI 可用（enabled=true 且 api-password 已配置）且本开关打开时护理问答才可用。
    care-qa:
      enabled: ${AI_CARE_QA_ENABLED:false}
