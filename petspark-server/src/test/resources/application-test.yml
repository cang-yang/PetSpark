# 测试 profile：禁用 AI，复用本机 MySQL 8.0.40。
# DataSource 连接信息由进程环境变量注入（scripts/load-local-env.ps1 从 .env.local 读取）：
#   DB_URL / DB_USERNAME / DB_PASSWORD
# 不在本文件写入任何账号密码，禁止提交 .env.local。
spring:
  flyway:
    enabled: true
    clean-disabled: false
  ai:
    enabled: false

petspark:
  ai:
    enabled: false
  notification:
    dispatcher:
      # 测试中禁用后台轮询（间隔拉到 1 小时，相当于不在短测试内触发），
      # 由测试同步调用 dispatchOnce() 控制投递时机，避免与断言竞争。
      poll-interval-seconds: 3600
      # 退避设为 0，使失败事件可被连续 dispatchOnce 立即重试，便于死信测试。
      backoff-seconds: 0
      max-attempts: 5
      batch-size: 20
      # 僵死回收阈值：测试用 0 秒，使任何卡在 PROCESSING 的事件在下一轮 dispatchOnce
      # 立即被回收回 PENDING，便于同步断言回收行为（生产默认 120s）。
      stuck-processing-seconds: 0